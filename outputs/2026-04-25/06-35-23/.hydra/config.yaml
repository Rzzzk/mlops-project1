dataset:
  train_path: data/raw/train.csv
  target: Survived
  numeric_features:
  - Age
  - Fare
  - SibSp
  - Parch
  categorical_features:
  - Embarked
  - Sex
  - Pclass
  test_size: 0.2
  random_state: 42
model:
  output_path: models/best_model.pkl
  logistic_regression:
    max_iter: 1000
  random_forest:
    n_estimators: 100
    random_state: 42
